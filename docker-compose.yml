version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sentravision-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sentravision}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentravision_secret}
      POSTGRES_DB: ${POSTGRES_DB:-sentravision}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentravision -d sentravision"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sentravision-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  backend:
    build:
      context: ./backend
    container_name: sentravision-backend
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sentravision}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentravision_secret}
      POSTGRES_DB: ${POSTGRES_DB:-sentravision}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      DEBUG: "false"
    volumes:
      - video_data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: ./backend
    container_name: sentravision-worker
    command: celery -A app.worker.celery_app:celery_app worker -l info --concurrency=2
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sentravision}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentravision_secret}
      POSTGRES_DB: ${POSTGRES_DB:-sentravision}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      DEBUG: "false"
    volumes:
      - video_data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    container_name: sentravision-frontend
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: sentravision-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  video_data:
